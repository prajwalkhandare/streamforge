# k8s/manifests/secrets.yaml
# THIS IS A TEMPLATE - DO NOT COMMIT REAL SECRETS TO GIT!
# Use with: kubectl apply -f secrets.yaml (after editing)
# Better: Use AWS Secrets Manager or HashiCorp Vault

apiVersion: v1
kind: Secret
metadata:
  name: streamforge-secrets
  namespace: streamforge-dev
  labels:
    project: streamforge
    environment: dev
type: Opaque
stringData:
  # Database credentials
  db_host: "streamforge-dev-db.cluster-xxxxxx.ap-south-1.rds.amazonaws.com"
  db_name: "streamforge_dev"
  db_user: "streamforge_admin"
  db_password: "CHANGE_THIS_PASSWORD_NOW!"
  
  # Redis credentials
  redis_host: "streamforge-dev-redis.xxxxxx.ng.0001.aps1.cache.amazonaws.com"
  redis_password: "CHANGE_THIS_REDIS_PASSWORD!"
  
  # AWS credentials (if not using IAM roles)
  aws_access_key_id: "YOUR_AWS_ACCESS_KEY"
  aws_secret_access_key: "YOUR_AWS_SECRET_KEY"
  
  # JWT secret
  jwt_secret: "CHANGE_THIS_JWT_SECRET_KEY_NOW!"
  
  # API keys
  stripe_secret_key: "sk_test_xxxxxxxxxxxxxx"
  sendgrid_api_key: "SG.xxxxxxxxxxxxxxxx"
  
  # Cognito
  cognito_client_id: "xxxxxxxxxxxxxxxxxxxxxxxxxx"
---
